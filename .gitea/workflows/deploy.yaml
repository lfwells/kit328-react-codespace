name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to University VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to the student's specific directory
            cd /home/students/${{ secrets.STUDENT_NAME }}
            
            # Pull the latest changes from the Gitea repo
            git pull origin main
            
            # Rebuild and restart the containers
            # The --build flag ensures the Node.js image updates if code changed
            docker compose up -d --build